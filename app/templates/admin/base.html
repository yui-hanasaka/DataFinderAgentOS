<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} · AgentOS 管理</title>
<link rel="stylesheet" href="{{ static_url('css/base.css') }}">
{% block head_extra %}{% end %}
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (!t || t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.setAttribute('data-theme', t);
})();
</script>
<script src="{{ static_url('js/base.js') }}"></script>
</head>
<body class="adm-shell">
<div class="adm-layout">
  <!-- Sidebar -->
  <aside class="adm-sidebar" id="admSidebar">
    <a class="adm-brand" href="/home" title="返回用户端">
      <div class="adm-brand-dot">D</div>
      <div>
        <strong>AgentOS</strong>
        <span>后台管理</span>
      </div>
    </a>

    <div class="adm-nav-label">主菜单</div>
    <nav class="adm-nav">
      {% set current = request.path %}
      <a href="/admin/home" class="{% if current == '/admin/home' %}active{% end %}"><span class="nav-icon">🏠</span>后台主页</a>
      <a href="/admin/users" class="{% if current == '/admin/users' %}active{% end %}"><span class="nav-icon">👥</span>用户管理</a>
      <a href="/admin/roles" class="{% if current == '/admin/roles' %}active{% end %}"><span class="nav-icon">🛡</span>角色管理</a>
      <a href="/admin/menus" class="{% if current == '/admin/menus' %}active{% end %}"><span class="nav-icon">📋</span>功能管理</a>
      <a href="/admin/permissions" class="{% if current == '/admin/permissions' %}active{% end %}"><span class="nav-icon">🔐</span>权限管理</a>
    </nav>

    <div class="adm-nav-label">业务模块</div>
    <nav class="adm-nav">
      <a href="/admin/models" class="{% if current == '/admin/models' %}active{% end %}"><span class="nav-icon">🧠</span>模型引擎</a>
      <a href="/admin/skills" class="{% if current == '/admin/skills' %}active{% end %}"><span class="nav-icon">⚡</span>技能管理</a>
      <a href="/admin/employees" class="{% if current == '/admin/employees' %}active{% end %}"><span class="nav-icon">🤖</span>数字员工</a>
      <a href="/admin/watchtower" class="{% if current == '/admin/watchtower' %}active{% end %}"><span class="nav-icon">📡</span>瞭望管理</a>
      <a href="/admin/warehouse" class="{% if current == '/admin/warehouse' %}active{% end %}"><span class="nav-icon">🗄</span>数据仓库</a>
      <a href="/admin/deep" class="{% if current == '/admin/deep' %}active{% end %}"><span class="nav-icon">🔍</span>深度采集</a>
      <a href="/admin/apis" class="{% if current == '/admin/apis' %}active{% end %}"><span class="nav-icon">🔌</span>接口管理</a>
    </nav>

    <div class="adm-nav-label">监控</div>
    <nav class="adm-nav">
      <a href="/admin/sessions" class="{% if current == '/admin/sessions' %}active{% end %}"><span class="nav-icon">💬</span>会话管理</a>
      <a href="/admin/screen" class="{% if current == '/admin/screen' %}active{% end %}"><span class="nav-icon">📊</span>数智大屏</a>
      <a href="/admin/settings" class="{% if current == '/admin/settings' %}active{% end %}"><span class="nav-icon">⚙</span>系统设置</a>
    </nav>

    <div class="adm-sidebar-footer">
      <button class="adm-theme-btn" id="themeIcon" onclick="toggleTheme()" title="切换暗色主题">🌙</button>
      <span class="adm-user">{{ username }}</span>
      <form method="post" action="/admin/logout">
        {% module xsrf_form_html() %}
        <button type="submit" class="adm-logout-btn">退出</button>
      </form>
    </div>
  </aside>

  <!-- Main -->
  <div class="adm-main">
    <!-- Mobile menu toggle -->
    <button class="adm-menu-toggle" onclick="document.getElementById('admSidebar').classList.toggle('open')">☰</button>
    <main class="adm-workspace">
      {% block body %}{% end %}
    </main>
  </div>
</div>

<!-- Glass Toast Container -->
<div class="adm-toast-container" id="admToastContainer"></div>

<!-- Glass Modal -->
<div class="adm-modal-mask" id="admModalMask" onclick="closeAllAdmModals()"></div>
<div class="adm-modal" id="admModal">
  <div class="adm-modal-header">
    <h5 id="admModalTitle">操作确认</h5>
    <button class="adm-modal-close" onclick="closeAdmModal()">✕</button>
  </div>
  <div class="adm-modal-body" id="admModalBody">确认执行该操作？</div>
  <div class="adm-modal-footer">
    <button class="adm-btn adm-btn-ghost" onclick="closeAdmModal()">取消</button>
    <button class="adm-btn adm-btn-primary" id="admModalSubmit">确认执行</button>
  </div>
</div>

<script>
/* ── Bootstrap data-bs-toggle="modal" compat ── */
document.querySelectorAll('[data-bs-toggle="modal"]').forEach(function(el){
  el.addEventListener('click', function(e){
    e.preventDefault();
    var targetSel = el.getAttribute('data-bs-target');
    var target = targetSel ? document.querySelector(targetSel) : null;
    if (target) {
      target.classList.add('show');
      document.getElementById('admModalMask').classList.add('show');
      // Wire dismiss buttons inside this modal (including btn-close without data-bs-dismiss)
      target.querySelectorAll('[data-bs-dismiss="modal"], .btn-close').forEach(function(btn){
        btn.onclick = function(){
          target.classList.remove('show');
          document.getElementById('admModalMask').classList.remove('show');
        };
      });
    }
  });
});

/* ── Bootstrap-modal compatibility for CRUD pages ── */
document.querySelectorAll('.admin-edit-modal').forEach(function(modal){
  modal.querySelectorAll('[data-bs-dismiss="modal"]').forEach(function(btn){
    btn.onclick = function(){ modal.classList.remove('show'); };
  });
  if (modal.dataset.autoOpen === 'true') { modal.classList.add('show'); }
});

/* ── Toast ── */
function showAdmToast(msg) {
  var container = document.getElementById('admToastContainer');
  var toast = document.createElement('div');
  toast.className = 'adm-toast';
  toast.textContent = msg;
  container.appendChild(toast);
  requestAnimationFrame(function(){ toast.classList.add('show'); });
  setTimeout(function(){ toast.classList.remove('show'); setTimeout(function(){ toast.remove(); }, 400); }, 2800);
}

/* ── Modal ── */
var admModalCb = null;
function openAdmModal(title, body, cb) {
  document.getElementById('admModalTitle').textContent = title;
  document.getElementById('admModalBody').textContent = body;
  document.getElementById('admModalMask').classList.add('show');
  document.getElementById('admModal').classList.add('show');
  admModalCb = cb;
}
function closeAdmModal() {
  document.getElementById('admModalMask').classList.remove('show');
  document.getElementById('admModal').classList.remove('show');
  admModalCb = null;
}
document.getElementById('admModalSubmit').addEventListener('click', function(){
  if (admModalCb) admModalCb();
  closeAdmModal();
});

/* ── Confirm forms ── */
document.querySelectorAll('form[data-confirm]').forEach(function(form){
  form.addEventListener('submit', function(e){
    if (form.dataset.confirmed === 'true') return;
    e.preventDefault();
    openAdmModal('操作确认', form.dataset.confirm || '确认执行该操作？', function(){
      form.dataset.confirmed = 'true';
      form.submit();
    });
  });
});

/* ── Auto-open modals (for edit pages) ── */
document.querySelectorAll('[data-modal-open]').forEach(function(el){
  var modalEl = document.getElementById(el.dataset.modalOpen);
  if (modalEl) { modalEl.classList.add('show'); document.getElementById('admModalMask').classList.add('show'); }
});

/* ── Auto-open admin-edit-modal with mask ── */
document.querySelectorAll('.admin-edit-modal[data-auto-open="true"]').forEach(function(modal){
  modal.classList.add('show');
  document.getElementById('admModalMask').classList.add('show');
});

/* ── closeAllAdmModals: close any open admin-edit-modal too ── */
function closeAllAdmModals() {
  closeAdmModal();
  document.querySelectorAll('.admin-edit-modal.show').forEach(function(m){ m.classList.remove('show'); });
  document.querySelectorAll('.modal.show').forEach(function(m){ m.classList.remove('show'); });
}

/* ── Auto-show toasts ── */
document.querySelectorAll('.adm-toast-auto').forEach(function(el){
  showAdmToast(el.textContent.trim());
  el.remove();
});

/* ── Theme ── */
initThemeIcon('themeIcon');

/* ── Sticky page-head scroll shadow ── */
(function(){
  var head = document.querySelector('.adm-page-head');
  if (!head) return;
  var ws = document.querySelector('.adm-workspace');
  if (!ws) return;
  ws.addEventListener('scroll', function(){
    head.classList.toggle('scrolled', ws.scrollTop > 8);
  });
})();
</script>
</body>
</html>
