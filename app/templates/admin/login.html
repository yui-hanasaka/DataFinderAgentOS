<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{ title }}</title>
	<link rel="stylesheet" href="{{ static_url('css/base.css') }}">
</head>
<body class="admin-login-page">
	<main class="admin-login-shell">
		<section class="admin-login-card">
			<div class="admin-login-visual" aria-hidden="true">
				<div class="visual-window">
					<div class="window-bar"></div>
					<div class="window-line line-one"></div>
					<div class="window-line line-two"></div>
					<div class="window-grid">
						<span></span><span></span><span></span>
					</div>
				</div>
				<div class="visual-person">
					<div class="person-head"></div>
					<div class="person-body"></div>
					<div class="person-chair"></div>
				</div>
				<div class="visual-desk"></div>
				<div class="visual-plant"></div>
			</div>
			<div class="admin-login-panel">
				<div class="admin-login-title">
					<p>DataFinder AgentOS</p>
					<h1>欢迎登录</h1>
					<span>请使用管理员账号进入后台管理系统</span>
				</div>
				{% if error %}
				<div class="admin-login-error">{{ error }}</div>
				{% end %}
				<form method="post" action="/admin/login" class="admin-login-form">
					{% module xsrf_form_html() %}
					<label>
						<span>管理员账号</span>
						<input type="text" name="username" placeholder="admin" autocomplete="username" autofocus>
					</label>
					<label>
						<span>登录密码</span>
						<input type="password" name="password" placeholder="admin888" autocomplete="current-password">
					</label>
					<button type="submit">登录后台</button>
				</form>
				<div class="admin-login-tip">智能数据瞭望与智能问数系统</div>
			</div>
		</section>
	</main>
</body>
</html>
