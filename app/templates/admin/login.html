<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} · AgentOS</title>
<link rel="stylesheet" href="{{ static_url('css/base.css') }}">
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (!t || t === 'light') document.documentElement.setAttribute('data-theme', 'light');
  else document.documentElement.setAttribute('data-theme', t);
})();
</script>
<script src="{{ static_url('js/base.js') }}"></script>
<style>
/* Admin login — glassmorphism variant */
.admlogin-shell {
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 24px; position:relative;
  background:radial-gradient(ellipse at 20% 50%, #1e1b4b 0%, #0f0d22 40%, #09071a 100%);
  font-family:"Microsoft YaHei","PingFang SC","Segoe UI",-apple-system,sans-serif;
  transition:background .5s ease;
}
.admlogin-shell::before {
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(circle at 70% 30%, rgba(99,102,241,.06) 0, transparent 50%),
             radial-gradient(circle at 30% 80%, rgba(139,92,246,.04) 0, transparent 50%);
}
.admlogin-back {
  position:absolute; top:28px; left:32px; z-index:10; display:inline-flex; align-items:center; gap:6px;
  padding:8px 18px; border-radius:999px; border:1px solid rgba(139,130,255,.25);
  background:rgba(15,13,34,.5); backdrop-filter:blur(16px); color:#c0c0e0;
  font-size:13px; text-decoration:none; transition:all .2s;
}
.admlogin-back:hover { border-color:rgba(139,130,255,.5); background:rgba(139,130,255,.1); color:#fff; }
.admlogin-theme-btn {
  position:absolute; top:28px; right:32px; z-index:10;
  width:38px;height:38px;border-radius:50%;border:1px solid rgba(139,130,255,.25);
  background:rgba(15,13,34,.5);backdrop-filter:blur(16px);color:#e0d060;cursor:pointer;font-size:18px;
  display:grid;place-items:center;transition:all var(--spring,.25s);
}
.admlogin-theme-btn:hover { border-color:rgba(139,130,255,.5);background:rgba(139,130,255,.18);transform:rotate(20deg)}

.admlogin-card {
  position:relative; z-index:1; width:min(440px, 100%);
  background:rgba(20,18,48,.6); backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:22px; border:1px solid rgba(139,130,255,.1);
  box-shadow:0 24px 80px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
  padding:48px 40px; color:#e0e0f8; transition:all .4s;
}
.admlogin-card .brand { text-align:center; margin-bottom:36px; }
.admlogin-card .brand .dot {
  width:52px;height:52px;border-radius:14px; margin:0 auto 16px;
  background:linear-gradient(135deg,#818cf8,#6366f1);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:26px;
  box-shadow:0 10px 30px rgba(99,102,241,.45);
}
.admlogin-card .brand p { margin:0 0 4px; font-size:12px; letter-spacing:.16em; color:#818cf8; text-transform:uppercase; }
.admlogin-card .brand h1 { margin:0; font-size:24px; font-weight:700; color:#fff; letter-spacing:.04em; }
.admlogin-card .brand span { display:block; margin-top:8px; font-size:13px; color:#7c7ca8; }

.admlogin-error { margin-bottom:20px; padding:11px 14px; border-radius:10px; background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.25); font-size:13px; }

.admlogin-form { display:grid; gap:18px; }
.admlogin-form label { display:grid; gap:6px; font-size:13px; color:#a0a0d0; }
.admlogin-form input {
  height:50px; padding:0 16px; border:1px solid rgba(139,130,255,.15); border-radius:12px;
  background:rgba(18,16,38,.5); color:#e0e0f8; font-size:15px; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.admlogin-form input:focus { border-color:rgba(139,130,255,.4); box-shadow:0 0 0 4px rgba(99,102,241,.1); }
.admlogin-form button {
  height:52px; margin-top:8px; border:0; border-radius:14px;
  background:linear-gradient(135deg,#6366f1,#7c3aed); color:#fff;
  font-size:16px; font-weight:700; letter-spacing:.12em; cursor:pointer;
  box-shadow:0 10px 28px rgba(99,102,241,.35), inset 0 1px 0 rgba(255,255,255,.12);
  transition:all var(--spring,.25s);
}
.admlogin-form button:hover { box-shadow:0 16px 40px rgba(99,102,241,.5); transform:translateY(-2px); }
.admlogin-form button:active { transform:scale(.97); }

.admlogin-cross { margin-top:22px; text-align:center; }
.admlogin-cross a { color:#7c7ca8; font-size:13px; text-decoration:none; transition:color .2s; }
.admlogin-cross a:hover { color:#818cf8; }

/* ── Light theme ── */
[data-theme="light"] .admlogin-shell { background:radial-gradient(ellipse at 20% 50%, #f0edff 0%, #e8e4f8 40%, #ded8f0 100%); }
[data-theme="light"] .admlogin-back { border-color:rgba(99,102,241,.2); background:rgba(255,255,255,.5); color:#4d4a70; }
[data-theme="light"] .admlogin-back:hover { border-color:rgba(99,102,241,.4); background:rgba(255,255,255,.7); color:#2d2a4a; }
[data-theme="light"] .admlogin-theme-btn { border-color:rgba(99,102,241,.2); background:rgba(255,255,255,.5); color:#b08830; }
[data-theme="light"] .admlogin-theme-btn:hover { border-color:rgba(99,102,241,.4); background:rgba(255,255,255,.7); }
[data-theme="light"] .admlogin-card { background:rgba(255,255,255,.7); border-color:rgba(99,102,241,.06); box-shadow:0 24px 80px rgba(99,102,241,.08), inset 0 1px 0 rgba(255,255,255,.5); color:#2d2a4a; }
[data-theme="light"] .admlogin-card .brand p { color:#6366f1; }
[data-theme="light"] .admlogin-card .brand h1 { color:#2d2a4a; }
[data-theme="light"] .admlogin-card .brand span { color:#6b6798; }
[data-theme="light"] .admlogin-form label { color:#4d4a70; }
[data-theme="light"] .admlogin-form input { background:rgba(255,255,255,.5); border-color:rgba(99,102,241,.1); color:#2d2a4a; }
[data-theme="light"] .admlogin-form input:focus { border-color:rgba(99,102,241,.3); }
[data-theme="light"] .admlogin-cross a { color:#8a86c0; }
[data-theme="light"] .admlogin-cross a:hover { color:#6366f1; }

@media(max-width:520px){ .admlogin-card{padding:36px 24px} }
</style>

<div class="admlogin-shell">
  <a class="admlogin-back" href="/">← 返回首页</a>
  <button class="admlogin-theme-btn" id="themeIcon" onclick="toggleTheme()" title="切换暗色主题">🌙</button>

  <div class="admlogin-card">
    <div class="brand">
      <div class="dot">D</div>
      <p>DataFinder AgentOS</p>
      <h1>管理员登录</h1>
      <span>请输入管理员账号进入后台管理系统</span>
    </div>
    {% if error %}
    <div class="admlogin-error">{{ error }}</div>
    {% end %}
    <form class="admlogin-form" method="post" action="/admin/login">
      {% module xsrf_form_html() %}
      <label>管理员账号<input type="text" name="username" placeholder="admin" autocomplete="username" autofocus></label>
      <label>登录密码<input type="password" name="password" placeholder="admin888" autocomplete="current-password"></label>
      <button type="submit">登录后台</button>
    </form>
    <div class="admlogin-cross">
      <a href="/login">用户登录入口 →</a>
    </div>
  </div>
</div>

<script>initThemeIcon('themeIcon');</script>
</body>
</html>
