{% extends "base.html" %}
{% block body %}
<style>
*{box-sizing:border-box}
.chat-layout{display:flex;height:calc(100vh - 0px);overflow:hidden}
.sidebar{width:240px;min-width:240px;background:#f7f7f8;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;padding:12px}
.sidebar h3{margin:0 0 8px;font-size:.95rem;color:#555}
.btn-new{display:block;width:100%;padding:8px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;margin-bottom:10px}
.btn-new:hover{background:#3a57d4}
.emp-select{width:100%;padding:6px;border:1px solid #ddd;border-radius:5px;font-size:.85rem;margin-bottom:10px}
.session-list{flex:1;overflow-y:auto}
.session-item{padding:8px 10px;border-radius:5px;cursor:pointer;font-size:.85rem;color:#333;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item:hover{background:#ebebeb}
.session-item.active{background:#e0e7ff;color:#4f6ef7}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:70%;padding:10px 14px;border-radius:12px;line-height:1.5;font-size:.93rem;word-break:break-word}
.msg.user{align-self:flex-end;background:#4f6ef7;color:#fff;border-bottom-right-radius:3px}
.msg.assistant{align-self:flex-start;background:#f0f0f0;color:#222;border-bottom-left-radius:3px}
.msg code{background:rgba(0,0,0,.08);padding:1px 4px;border-radius:3px;font-family:monospace}
.msg pre{background:rgba(0,0,0,.08);padding:8px;border-radius:6px;overflow-x:auto}
.msg pre code{background:none;padding:0}
.input-area{border-top:1px solid #e5e5e5;padding:12px 16px;background:#fff}
.hints{font-size:.78rem;color:#999;margin-bottom:6px}
.hints span{margin-right:10px;cursor:default}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;resize:none;font-size:.93rem;min-height:42px;max-height:120px}
.input-row textarea:focus{outline:none;border-color:#4f6ef7}
.btn-send{padding:8px 18px;background:#4f6ef7;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.93rem;height:42px}
.btn-send:hover{background:#3a57d4}
.btn-send:disabled{background:#aaa;cursor:not-allowed}
.export-link{font-size:.8rem;color:#999;text-decoration:none;margin-left:8px;align-self:center}
.export-link:hover{color:#4f6ef7}
</style>

<div class="chat-layout">
  <div class="sidebar">
    <button class="btn-new" onclick="newSession()">+ 新建对话</button>
    <select class="emp-select" id="empSelect" onchange="switchEmployee(this.value)">
      {% for e in employees %}
      <option value="{{ e["id"] }}" {% if e["id"] == current_employee_id %}selected{% end %}>{{ e["name"] }}</option>
      {% end %}
    </select>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <h3 style="margin:0">对话列表</h3>
      <button id="btnBatch" style="background:none;border:1px solid #ccc;border-radius:4px;padding:2px 8px;font-size:.75rem;cursor:pointer;color:#666" onclick="toggleBatchMode()">批量管理</button>
    </div>
    <div id="batchBar" style="display:none;margin-bottom:6px;align-items:center;gap:6px">
      <label style="font-size:.78rem;color:#666;cursor:pointer"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> 全选</label>
      <button style="background:#e74c3c;color:#fff;border:none;border-radius:4px;padding:2px 10px;font-size:.75rem;cursor:pointer" onclick="batchDelete()">删除选中</button>
      <button style="background:none;border:1px solid #ccc;border-radius:4px;padding:2px 8px;font-size:.75rem;cursor:pointer;color:#666" onclick="toggleBatchMode()">取消</button>
    </div>
    <div class="session-list" id="sessionList">
      {% for s in sessions %}
      <div class="session-item {% if s["id"] == (current_session["id"] if current_session else -1) %}active{% end %}"
           onclick="sessionClick(event, '{{ s["id"] }}')">
        <input type="checkbox" class="session-cb" value="{{ s['id'] }}" style="display:none;margin-right:6px" onclick="event.stopPropagation()">
        <span>{{ s["title"] or '无标题对话' }}</span>
      </div>
      {% end %}
    </div>
  </div>
  <div class="main">
    <div class="messages" id="messages">
      {% for m in messages %}
      <div class="msg {{ m["role"] }}">{{ m["content"] }}</div>
      {% end %}
    </div>
    <div class="input-area">
      <div class="hints">
        <span>@weather</span><span>@music</span><span>@西师妹</span><span>\search</span>
      </div>
      <div class="input-row">
        <textarea id="msgInput" placeholder="{% if current_session %}输入消息...{% else %}请先新建对话{% end %}" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" {% if not current_session %}disabled{% end %}></textarea>
        <button class="btn-send" id="sendBtn" onclick="send()" {% if not current_session %}disabled{% end %}>发送</button>
        <a class="export-link" {% if current_session %}href="/chat/export/{{ current_session["id"] }}"{% end %} target="_blank">导出PDF</a>
      </div>
    </div>
  </div>
</div>

<script>
const SESSION_ID = '{{ current_session["id"] if current_session else "" }}';

function getCookie(name) {
  const v = document.cookie.split('; ').find(r => r.startsWith(name + '='));
  return v ? decodeURIComponent(v.split('=')[1]) : '';
}

function renderContent(text) {
  // code blocks
  text = text.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  // inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  return text;
}

function appendUserMsg(content) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = content;
  document.getElementById('messages').appendChild(d);
  scrollBottom();
}

function appendAssistantMsg(content) {
  const d = document.createElement('div');
  d.className = 'msg assistant';
  d.innerHTML = renderContent(content);
  document.getElementById('messages').appendChild(d);
  scrollBottom();
  return d;
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

async function send() {
  if (!SESSION_ID) return;
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;

  appendUserMsg(content);
  const msgDiv = appendAssistantMsg('');

  try {
    const resp = await fetch(`/chat/send/${SESSION_ID}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf')},
      body: JSON.stringify({message: content})
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', accumulated = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') { btn.disabled = false; return; }
          try { accumulated += JSON.parse(data).content; } catch(e) {}
          msgDiv.innerHTML = renderContent(accumulated);
          scrollBottom();
        }
      }
    }
  } catch(e) {
    msgDiv.textContent = '请求失败：' + e.message;
  }
  btn.disabled = false;
}

function sessionClick(e, id) {
  if (batchMode) {
    const cb = e.currentTarget.querySelector('.session-cb');
    if (cb) { cb.checked = !cb.checked; }
    return;
  }
  window.location.href = '/chat/session/' + id;
}

function switchSession(id) {
  window.location.href = '/chat/session/' + id;
}

function newSession() {
  const empId = document.getElementById('empSelect').value || 0;
  window.location.href = '/chat/new?employee_id=' + empId;
}

function switchEmployee(id) {
  fetch('/chat/employee', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf')},
    body: JSON.stringify({employee_id: id})
  }).then(() => window.location.reload());
}

let batchMode = false;
function toggleBatchMode() {
  batchMode = !batchMode;
  document.querySelectorAll('.session-cb').forEach(cb => { cb.style.display = batchMode ? 'inline' : 'none'; cb.checked = false; });
  document.getElementById('batchBar').style.display = batchMode ? 'flex' : 'none';
  document.getElementById('selectAll').checked = false;
  document.getElementById('btnBatch').textContent = batchMode ? '完成' : '批量管理';
}

function toggleSelectAll() {
  const checked = document.getElementById('selectAll').checked;
  document.querySelectorAll('.session-cb').forEach(cb => { cb.checked = checked; });
}

function batchDelete() {
  const ids = [];
  document.querySelectorAll('.session-cb:checked').forEach(cb => { ids.push(parseInt(cb.value)); });
  if (!ids.length) return alert('请至少选择一个对话');
  if (!confirm('确认删除选中的 ' + ids.length + ' 个对话？此操作不可恢复。')) return;
  fetch('/chat/batch-delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf')},
    body: JSON.stringify({ids: ids})
  }).then(r => r.json()).then(data => {
    if (data.ok) window.location.reload();
    else alert(data.error);
  }).catch(e => alert('删除失败：' + e.message));
}
</script>
{% end %}
