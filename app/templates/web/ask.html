{% extends "base.html" %}
{% block body %}
<style>
  body {
    background: radial-gradient(ellipse at 50% 50%, #161233 0%, #0c0a1f 60%, #050410 100%) !important;
    min-height: 100vh;
    color: #e0e0f8;
  }
  .base {
    background: transparent !important;
  }

  .ask-wrap {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 16px;
  }

  .ask-card {
    background: rgba(20, 18, 43, 0.75);
    backdrop-filter: blur(35px) saturate(180%);
    -webkit-backdrop-filter: blur(35px) saturate(180%);
    border: 1px solid rgba(139, 130, 255, 0.1);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }

  .ask-header {
    margin-bottom: 24px;
    border-bottom: 1px solid rgba(139, 130, 255, 0.08);
    padding-bottom: 16px;
  }

  .ask-header h2 {
    margin: 0 0 6px;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.05em;
  }

  .ask-subtitle {
    margin: 0;
    font-size: 14px;
    color: #8b949e;
  }

  .query-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .query-row input {
    flex: 1;
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(139, 130, 255, 0.15);
    border-radius: 10px;
    color: #fff;
    padding: 12px 18px;
    font-size: 15px;
    transition: all 0.3s ease;
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.15);
  }

  .query-row input::placeholder {
    color: #58588a;
  }

  .query-row input:focus {
    outline: none;
    border-color: var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0, 242, 254, 0.3), inset 0 2px 6px rgba(0, 0, 0, 0.2);
    background: rgba(0, 0, 0, 0.35);
  }

  .btn {
    padding: 12px 24px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
  }

  .btn:hover {
    background: linear-gradient(135deg, #4f46e5, #6d28d9);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
    transform: translateY(-1px);
  }

  .btn:disabled {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.2);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* pipeline styling */
  .pipeline-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 24px 0;
    padding: 20px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(139, 130, 255, 0.06);
    border-radius: 14px;
  }

  .pipeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    text-align: center;
    opacity: 0.3;
    transition: all 0.4s ease;
  }

  .pipeline-step.active {
    opacity: 1;
    transform: scale(1.08);
  }

  .pipeline-step.active .step-icon {
    background: rgba(0, 242, 254, 0.15);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
  }

  .pipeline-step.success {
    opacity: 1;
  }

  .pipeline-step.success .step-icon {
    background: rgba(52, 211, 153, 0.15);
    border-color: var(--neon-green);
    color: var(--neon-green);
    box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
  }

  .pipeline-step.error {
    opacity: 1;
  }

  .pipeline-step.error .step-icon {
    background: rgba(239, 68, 68, 0.15);
    border-color: #f87171;
    color: #f87171;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
  }

  .step-icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.03);
    display: grid;
    place-items: center;
    font-size: 20px;
    transition: all 0.3s ease;
  }

  .step-label {
    font-size: 11px;
    color: #a0a0d0;
    font-weight: 500;
  }

  .pipeline-arrow {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.1);
    margin-bottom: 20px;
    transition: color 0.4s ease;
  }

  .pipeline-arrow.active {
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
  }

  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #c4b5fd;
    font-size: 14px;
    margin: 24px 0;
    padding: 16px;
    background: rgba(99, 102, 241, 0.05);
    border: 1px dashed rgba(99, 102, 241, 0.2);
    border-radius: 12px;
    animation: pulseBg 2s infinite alternate;
  }

  @keyframes pulseBg {
    from { background: rgba(99, 102, 241, 0.03); }
    to { background: rgba(99, 102, 241, 0.08); }
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(0, 242, 254, 0.2);
    border-top-color: var(--neon-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error {
    color: #f87171;
    margin: 16px 0;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.2);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
  }

  .result-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 24px 0 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(139, 130, 255, 0.08);
  }

  .result-bar .btn-sm {
    padding: 6px 14px;
    font-size: 13px;
    background: rgba(139, 130, 255, 0.08);
    border: 1px solid rgba(139, 130, 255, 0.15);
    color: #c4b5fd;
    box-shadow: none;
  }
  .result-bar .btn-sm:hover {
    background: rgba(139, 130, 255, 0.2);
    border-color: var(--neon-cyan);
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border-radius: 12px;
    overflow: hidden;
    font-size: 13px;
    margin-bottom: 24px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(139, 130, 255, 0.1);
  }

  th {
    background: rgba(139, 130, 255, 0.12);
    color: #c4b5fd;
    padding: 14px 16px;
    text-align: left;
    font-weight: 600;
    border-bottom: 1.5px solid rgba(139, 130, 255, 0.18);
    letter-spacing: 0.02em;
  }

  td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(139, 130, 255, 0.06);
    color: #e2e8f0;
    transition: all 0.2s;
  }

  tr:last-child td {
    border-bottom: none;
  }

  tr:hover td {
    background: rgba(139, 130, 255, 0.06);
    color: #fff;
  }

  #chart {
    width: 100%;
    height: 380px;
    margin-top: 24px;
    padding: 16px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid rgba(139, 130, 255, 0.06);
    border-radius: 12px;
    display: none;
  }
</style>

<div class="ask-wrap">
  <div class="ask-card">
    <div class="ask-header">
      <h2><i class="fa-solid fa-chart-line" style="color: var(--neon-cyan); margin-right: 8px;"></i>数据智能问答</h2>
      <p class="ask-subtitle">使用自然语言，即刻分析查询企业内部数据库</p>
    </div>
    <div class="query-row">
      <input type="text" id="queryInput" placeholder="用自然语言描述你的查询，例如：最近7天销售额趋势" value="{{ query or '' }}"
        onkeydown="if(event.key==='Enter') submitQuery()">
      <button class="btn" id="submitBtn" onclick="submitQuery()">问数</button>
    </div>

    <!-- 问数决策流可视化 -->
    <div class="pipeline-container" id="pipelineContainer">
      <div class="pipeline-step" id="step-nl">
        <div class="step-icon">💬</div>
        <div class="step-label">自然语言输入 (NL)</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-ast">
        <div class="step-icon">🌳</div>
        <div class="step-label">语法解析 (AST)</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-sql">
        <div class="step-icon">💻</div>
        <div class="step-label">SQL 翻译转换</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-exec">
        <div class="step-icon">⚡</div>
        <div class="step-label">数据库执行</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-render">
        <div class="step-icon">📊</div>
        <div class="step-label">结果可视化</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <span>正在解析语言结构并执行数据库查询...</span>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% end %}

    <div id="resultArea"{% if not results %} style="display:none"{% end %}>
      <div class="result-bar">
        <span id="rowCount" style="color:#a0a0d0;font-size:.88rem"></span>
        <button class="btn btn-sm" onclick="renderChart()">生成图表</button>
        <a id="csvLink" href="#" class="btn btn-sm" style="text-decoration:none;display:none">导出CSV</a>
      </div>
      <div style="overflow-x:auto">
        <table id="resultTable">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="chart"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<div id="ask-init-data" hidden>{% raw ask_init_json %}</div>
<script>
  var _askInit = JSON.parse(document.getElementById('ask-init-data').textContent);
  let currentColumns = _askInit.columns || [];
  let currentRows = _askInit.results || [];

  if (currentRows.length) {
    renderTable(currentColumns, currentRows);
    // On load, since we already have results, light up all steps
    document.querySelectorAll('.pipeline-step').forEach(el => el.classList.add('success'));
    document.querySelectorAll('.pipeline-arrow').forEach(el => el.classList.add('active'));
  }

  function getCookie(name) {
    const v = document.cookie.split('; ').find(r => r.startsWith(name + '='));
    return v ? decodeURIComponent(v.split('=')[1]) : '';
  }

  function resetPipeline() {
    document.querySelectorAll('.pipeline-step').forEach(el => {
      el.className = 'pipeline-step';
    });
    document.querySelectorAll('.pipeline-arrow').forEach(el => {
      el.className = 'pipeline-arrow';
    });
  }

  async function runPipelineAnimation() {
    resetPipeline();
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    const nl = document.getElementById('step-nl');
    nl.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    nl.classList.remove('active');
    nl.classList.add('success');
    const arrow1 = document.querySelector('#step-nl + .pipeline-arrow');
    if (arrow1) arrow1.classList.add('active');
    const ast = document.getElementById('step-ast');
    ast.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    ast.classList.remove('active');
    ast.classList.add('success');
    const arrow2 = document.querySelector('#step-ast + .pipeline-arrow');
    if (arrow2) arrow2.classList.add('active');
    const sql = document.getElementById('step-sql');
    sql.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    sql.classList.remove('active');
    sql.classList.add('success');
    const arrow3 = document.querySelector('#step-sql + .pipeline-arrow');
    if (arrow3) arrow3.classList.add('active');
    const exec = document.getElementById('step-exec');
    exec.classList.add('active');
  }

  function completePipelineSuccess() {
    const exec = document.getElementById('step-exec');
    if (exec) {
      exec.classList.remove('active');
      exec.classList.add('success');
    }
    const arrow = document.querySelector('#step-exec + .pipeline-arrow');
    if (arrow) arrow.classList.add('active');
    const render = document.getElementById('step-render');
    if (render) render.classList.add('success');
  }

  function completePipelineError() {
    document.querySelectorAll('.pipeline-step.active').forEach(el => {
      el.classList.remove('active');
      el.classList.add('error');
    });
  }

  async function submitQuery() {
    const q = document.getElementById('queryInput').value.trim();
    if (!q) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('chart').style.display = 'none';

    runPipelineAnimation();

    try {
      const resp = await fetch('/ask/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf') },
        body: JSON.stringify({ query: q })
      });
      const data = await resp.json();
      document.getElementById('loading').style.display = 'none';
      if (!data.ok) {
        completePipelineError();
        alert('查询失败：' + (data.error || '未知错误'));
      } else {
        completePipelineSuccess();
        currentColumns = data.columns || [];
        currentRows = data.rows || [];
        renderTable(currentColumns, currentRows);
        document.getElementById('resultArea').style.display = 'block';
        buildCsvLink(currentColumns, currentRows);
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      completePipelineError();
      alert('请求失败：' + e.message);
    }
    btn.disabled = false;
  }

  function renderTable(cols, rows) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    thead.replaceChildren();
    tbody.replaceChildren();
    var tr = document.createElement('tr');
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.textContent = c;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    rows.forEach(function (row) {
      var tr2 = document.createElement('tr');
      cols.forEach(function (c) {
        var td = document.createElement('td');
        td.textContent = row[c] != null ? String(row[c]) : '';
        tr2.appendChild(td);
      });
      tbody.appendChild(tr2);
    });
    document.getElementById('rowCount').textContent = '共 ' + rows.length + ' 条结果';
  }

  function buildCsvLink(cols, rows) {
    const lines = [cols.join(',')];
    for (const row of rows) lines.push(cols.map(function (c) {
      var v = row[c] != null ? String(row[c]) : '';
      return v.includes(',') || v.includes('"') ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(','));
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.getElementById('csvLink');
    link.href = URL.createObjectURL(blob);
    link.download = 'result.csv';
    link.style.display = 'inline-block';
  }

  function renderChart() {
    if (!currentRows.length || !currentColumns.length) return;
    const chartEl = document.getElementById('chart');
    chartEl.style.display = 'block';
    const chart = echarts.init(chartEl);
    const catCol = currentColumns[0];
    const numCols = currentColumns.slice(1).filter(function (c) {
      return currentRows.some(function (r) { return !isNaN(parseFloat(r[c])); });
    });
    const colors = ['#00f2fe', '#a18cd1', '#ec4899', '#34d399', '#fbbf24'];
    const series = numCols.map(function (c, idx) {
      return {
        name: c,
        type: 'bar',
        itemStyle: {
          color: colors[idx % colors.length],
          borderRadius: [4, 4, 0, 0]
        },
        data: currentRows.map(function (r) { return parseFloat(r[c]) || 0; })
      };
    });
    chart.setOption({
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'axis',
        backgroundColor: 'rgba(15, 13, 34, 0.85)',
        borderColor: 'rgba(0, 242, 254, 0.3)',
        textStyle: { color: '#fff' }
      },
      legend: {
        data: numCols,
        textStyle: { color: '#e0e0f8' }
      },
      xAxis: {
        type: 'category',
        data: currentRows.map(function (r) { return r[catCol]; }),
        axisLine: { lineStyle: { color: 'rgba(139, 130, 255, 0.2)' } },
        axisLabel: { color: '#a0a0d0' }
      },
      yAxis: {
        type: 'value',
        splitLine: { lineStyle: { color: 'rgba(139, 130, 255, 0.06)' } },
        axisLine: { lineStyle: { color: 'rgba(139, 130, 255, 0.2)' } },
        axisLabel: { color: '#a0a0d0' }
      },
      series: series
    });
    window.addEventListener('resize', function () { chart.resize(); });
  }
</script>
{% end %}
