{% extends "base.html" %}
{% block body %}
<style>
  /* ═══════════════ CSS Variables (mirrors chat.html) ═══════════════ */
  :root {
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --spring-soft: cubic-bezier(0.25, 1.2, 0.5, 1);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --bg-card: rgba(20, 18, 48, 0.50);
    --border: rgba(139, 130, 255, 0.10);
    --border-light: rgba(139, 130, 255, 0.06);
    --text: #e0e0f8;
    --text-muted: #9090b8;
    --bg-input: rgba(18, 16, 38, 0.6);
  }

  [data-theme="light"] {
    --bg-card: rgba(255, 255, 255, 0.55);
    --border: rgba(99, 102, 241, 0.10);
    --border-light: rgba(99, 102, 241, 0.06);
    --text: #2d2a4a;
    --text-muted: #6b6b8e;
    --bg-input: rgba(255, 255, 255, 0.5);
  }

  /* ── Body ── */
  body {
    background: radial-gradient(ellipse at 20% 50%, #1e1b4b 0%, #0f0d22 40%, #09071a 100%) !important;
    min-height: 100vh;
    color: var(--text);
    font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", -apple-system, sans-serif;
    transition: background 0.5s ease;
  }
  [data-theme="light"] body {
    background: radial-gradient(ellipse at 20% 50%, #f2eeff 0%, #eae4fa 40%, #e0daf2 100%) !important;
  }
  .base { background: transparent !important; }

  /* ── Theme Button ── */
  .theme-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(139, 130, 255, 0.25);
    background: rgba(30, 26, 58, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    cursor: pointer;
    font-size: 18px;
    display: grid;
    place-items: center;
    transition: all var(--spring);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.04);
  }
  .theme-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.35), 0 4px 20px rgba(0, 0, 0, 0.4);
    border-color: rgba(139, 130, 255, 0.5);
  }
  [data-theme="light"] .theme-btn {
    background: rgba(255, 255, 255, 0.75);
    border-color: rgba(99, 102, 241, 0.2);
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.6);
  }
  [data-theme="light"] .theme-btn:hover {
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.25), 0 4px 20px rgba(0, 0, 0, 0.1);
  }

  /* ── Layout ── */
  .ask-wrap {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 16px;
  }

  /* ── Card ── */
  .ask-card {
    background: var(--bg-card);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 24px 64px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    transition: background 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
  }
  [data-theme="light"] .ask-card {
    box-shadow: 0 24px 64px rgba(99, 102, 241, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  /* ── Header ── */
  .ask-header {
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
  }
  .ask-header h2 {
    margin: 0 0 6px;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .ask-subtitle { margin: 0; font-size: 14px; color: var(--text-muted); }

  /* ── Input Row ── */
  .query-row { display: flex; gap: 12px; margin-bottom: 24px; }
  .query-row input {
    flex: 1;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    padding: 12px 18px;
    font-size: 15px;
    transition: all var(--spring-soft);
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.08);
  }
  .query-row input::placeholder { color: var(--text-muted); }
  .query-row input:focus {
    outline: none;
    border-color: #6366f1;
    box-shadow: 0 0 14px rgba(99, 102, 241, 0.25), inset 0 2px 6px rgba(0, 0, 0, 0.1);
  }
  [data-theme="light"] .query-row input:focus {
    border-color: #6366f1;
  }

  /* ── Button ── */
  .btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: all var(--spring);
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
  }
  .btn:hover {
    background: linear-gradient(135deg, #4f46e5, #6d28d9);
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.45);
    transform: translateY(-1px);
  }
  .btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ── Pipeline ── */
  .pipeline-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 24px 0;
    padding: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    transition: background 0.5s ease;
  }
  .pipeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex: 1;
    text-align: center;
    opacity: 0.3;
    transition: all var(--spring-soft);
  }
  .pipeline-step.active { opacity: 1; transform: scale(1.08); }
  .pipeline-step.active .step-icon {
    background: rgba(0, 242, 254, 0.15);
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
  }
  .pipeline-step.success { opacity: 1; }
  .pipeline-step.success .step-icon {
    background: rgba(52, 211, 153, 0.15);
    border-color: var(--neon-green);
    color: var(--neon-green);
    box-shadow: 0 0 15px rgba(52, 211, 153, 0.4);
  }
  .pipeline-step.error { opacity: 1; }
  .pipeline-step.error .step-icon {
    background: rgba(239, 68, 68, 0.15);
    border-color: #f87171;
    color: #f87171;
    box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
  }
  .step-icon {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg-card);
    display: grid;
    place-items: center;
    font-size: 20px;
    transition: all var(--spring-soft);
  }
  .step-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .pipeline-arrow {
    font-size: 16px;
    color: var(--border);
    margin-bottom: 20px;
    transition: color 0.4s ease;
  }
  .pipeline-arrow.active {
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
  }

  /* ── Loading ── */
  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    font-size: 14px;
    margin: 24px 0;
    padding: 16px;
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .loading-spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(0, 242, 254, 0.2);
    border-top-color: var(--neon-cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error {
    color: #f87171;
    margin: 16px 0;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
  }

  /* ── Result Bar ── */
  .result-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 24px 0 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .result-bar .btn-sm {
    padding: 6px 14px; font-size: 13px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--spring);
    box-shadow: none;
  }
  .result-bar .btn-sm:hover {
    border-color: #6366f1;
    color: var(--text);
    transform: translateY(-1px);
    box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
  }

  /* ── Table ── */
  .table-wrapper {
    border-radius: 14px;
    overflow-x: auto;
    border: 1px solid var(--border);
    background: var(--bg-card);
    margin-bottom: 24px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    border-spacing: 0;
    font-size: 13px;
    background: transparent;
    border: none;
    margin: 0;
  }
  th {
    background: rgba(99, 102, 241, 0.12);
    color: #c4b5fd;
    padding: 14px 18px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 2px solid rgba(99, 102, 241, 0.2);
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  [data-theme="light"] th {
    background: rgba(99, 102, 241, 0.1);
    color: #4f46e5;
    border-bottom-color: rgba(99, 102, 241, 0.2);
  }
  td {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    transition: background 0.15s;
  }
  /* Zebra striping */
  tbody tr:nth-child(even) td {
    background: rgba(99, 102, 241, 0.03);
  }
  [data-theme="light"] tbody tr:nth-child(even) td {
    background: rgba(99, 102, 241, 0.04);
  }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td {
    background: rgba(99, 102, 241, 0.1) !important;
    color: #fff;
  }
  [data-theme="light"] tbody tr:hover td {
    background: rgba(99, 102, 241, 0.12) !important;
    color: #2d2a4a;
  }

  /* ── Chart ── */
  #chart {
    width: 100%; height: 400px;
    margin-bottom: 24px;
    padding: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: none;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  }
</style>

<button class="theme-btn" id="themeIcon" onclick="toggleTheme()" title="切换主题">🌙</button>

<div class="ask-wrap">
  <div class="ask-card">
    <div class="ask-header">
      <h2><i class="fa-solid fa-chart-line" style="color: #818cf8; margin-right: 8px;"></i>数据智能问答</h2>
      <p class="ask-subtitle">使用自然语言，即刻分析查询企业内部数据库</p>
    </div>
    <div class="query-row">
      <input type="text" id="queryInput" placeholder="用自然语言描述你的查询，例如：最近7天销售额趋势" value="{{ query or '' }}"
        onkeydown="if(event.key==='Enter') submitQuery()">
      <button class="btn" id="submitBtn" onclick="submitQuery()">问数</button>
    </div>

    <!-- 问数决策流可视化 -->
    <div class="pipeline-container" id="pipelineContainer">
      <div class="pipeline-step" id="step-nl">
        <div class="step-icon">💬</div>
        <div class="step-label">自然语言输入 (NL)</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-ast">
        <div class="step-icon">🌳</div>
        <div class="step-label">语法解析 (AST)</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-sql">
        <div class="step-icon">💻</div>
        <div class="step-label">SQL 翻译转换</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-exec">
        <div class="step-icon">⚡</div>
        <div class="step-label">数据库执行</div>
      </div>
      <div class="pipeline-arrow">➔</div>
      <div class="pipeline-step" id="step-render">
        <div class="step-icon">📊</div>
        <div class="step-label">结果可视化</div>
      </div>
    </div>

    <div class="loading" id="loading">
      <div class="loading-spinner"></div>
      <span>正在解析语言结构并执行数据库查询...</span>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% end %}

    <div id="resultArea"{% if not results %} style="display:none"{% end %}>
      <div class="result-bar">
        <span id="rowCount" style="color:var(--text-muted);font-size:.88rem"></span>
        <button class="btn btn-sm" onclick="renderChart()">📊 图表</button>
        <a id="csvLink" href="#" class="btn btn-sm" style="text-decoration:none;display:none">📥 导出CSV</a>
      </div>
      <div id="chart"></div>
      <div class="table-wrapper">
        <table id="resultTable">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<div id="ask-init-data" hidden>{% raw ask_init_json %}</div>
<script>
  var _askInit = JSON.parse(document.getElementById('ask-init-data').textContent);
  let currentColumns = _askInit.columns || [];
  let currentRows = _askInit.results || [];

  // Init theme icon
  if (typeof initThemeIcon === 'function') initThemeIcon('themeIcon');

  if (currentRows.length) {
    renderTable(currentColumns, currentRows);
    document.querySelectorAll('.pipeline-step').forEach(el => el.classList.add('success'));
    document.querySelectorAll('.pipeline-arrow').forEach(el => el.classList.add('active'));
  }

  function getCookie(name) {
    const v = document.cookie.split('; ').find(r => r.startsWith(name + '='));
    return v ? decodeURIComponent(v.split('=')[1]) : '';
  }

  function resetPipeline() {
    document.querySelectorAll('.pipeline-step').forEach(el => {
      el.className = 'pipeline-step';
    });
    document.querySelectorAll('.pipeline-arrow').forEach(el => {
      el.className = 'pipeline-arrow';
    });
  }

  async function runPipelineAnimation() {
    resetPipeline();
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    
    const nl = document.getElementById('step-nl');
    nl.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    nl.classList.remove('active');
    nl.classList.add('success');
    const arrow1 = document.querySelector('#step-nl + .pipeline-arrow');
    if (arrow1) arrow1.classList.add('active');
    const ast = document.getElementById('step-ast');
    ast.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    ast.classList.remove('active');
    ast.classList.add('success');
    const arrow2 = document.querySelector('#step-ast + .pipeline-arrow');
    if (arrow2) arrow2.classList.add('active');
    const sql = document.getElementById('step-sql');
    sql.classList.add('active');
    await sleep(400);
    if (document.getElementById('loading').style.display === 'none') return;
    
    sql.classList.remove('active');
    sql.classList.add('success');
    const arrow3 = document.querySelector('#step-sql + .pipeline-arrow');
    if (arrow3) arrow3.classList.add('active');
    const exec = document.getElementById('step-exec');
    exec.classList.add('active');
  }

  function completePipelineSuccess() {
    const exec = document.getElementById('step-exec');
    if (exec) {
      exec.classList.remove('active');
      exec.classList.add('success');
    }
    const arrow = document.querySelector('#step-exec + .pipeline-arrow');
    if (arrow) arrow.classList.add('active');
    const render = document.getElementById('step-render');
    if (render) render.classList.add('success');
  }

  function completePipelineError() {
    document.querySelectorAll('.pipeline-step.active').forEach(el => {
      el.classList.remove('active');
      el.classList.add('error');
    });
  }

  async function submitQuery() {
    const q = document.getElementById('queryInput').value.trim();
    if (!q) return;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('resultArea').style.display = 'none';
    document.getElementById('chart').style.display = 'none';

    runPipelineAnimation();

    try {
      const resp = await fetch('/ask/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf') },
        body: JSON.stringify({ query: q })
      });
      const data = await resp.json();
      document.getElementById('loading').style.display = 'none';
      if (!data.ok) {
        completePipelineError();
        alert('查询失败：' + (data.error || '未知错误'));
      } else {
        completePipelineSuccess();
        currentColumns = data.columns || [];
        currentRows = data.rows || [];
        renderTable(currentColumns, currentRows);
        document.getElementById('resultArea').style.display = 'block';
        buildCsvLink(currentColumns, currentRows);
        // Auto-render chart if there are numeric columns
        var hasNumeric = currentColumns.slice(1).some(function(c) {
          return currentRows.some(function(r) { return !isNaN(parseFloat(r[c])); });
        });
        if (hasNumeric || currentColumns.length >= 2) {
          setTimeout(function() { renderChart(); }, 300);
        }
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      completePipelineError();
      alert('请求失败：' + e.message);
    }
    btn.disabled = false;
  }

  function renderTable(cols, rows) {
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    thead.replaceChildren();
    tbody.replaceChildren();
    var tr = document.createElement('tr');
    cols.forEach(function (c) {
      var th = document.createElement('th');
      th.textContent = c;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    rows.forEach(function (row) {
      var tr2 = document.createElement('tr');
      cols.forEach(function (c) {
        var td = document.createElement('td');
        td.textContent = row[c] != null ? String(row[c]) : '';
        tr2.appendChild(td);
      });
      tbody.appendChild(tr2);
    });
    document.getElementById('rowCount').textContent = '共 ' + rows.length + ' 条结果';
  }

  function buildCsvLink(cols, rows) {
    const lines = [cols.join(',')];
    for (const row of rows) lines.push(cols.map(function (c) {
      var v = row[c] != null ? String(row[c]) : '';
      return v.includes(',') || v.includes('"') ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(','));
    const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const link = document.getElementById('csvLink');
    link.href = URL.createObjectURL(blob);
    link.download = 'result.csv';
    link.style.display = 'inline-block';
  }

  var _chartInstance = null;

  function renderChart() {
    if (!currentRows.length || !currentColumns.length) return;
    var chartEl = document.getElementById('chart');
    chartEl.style.display = 'block';

    // Dispose old instance for clean re-render
    if (_chartInstance) { _chartInstance.dispose(); }

    var chart = echarts.init(chartEl);
    _chartInstance = chart;

    var catCol = currentColumns[0];
    var numCols = currentColumns.slice(1).filter(function (c) {
      return currentRows.some(function (r) { return !isNaN(parseFloat(r[c])); });
    });

    // If no numeric columns, pick second column and try harder
    if (!numCols.length && currentColumns.length >= 2) {
      numCols = [currentColumns[1]];
    }

    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    var colors = isLight
      ? ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b']
      : ['#00f2fe', '#a18cd1', '#ec4899', '#34d399', '#fbbf24'];
    var textColor = isLight ? '#4d4a70' : '#c4b5fd';
    var axisColor = isLight ? 'rgba(99,102,241,0.25)' : 'rgba(139,130,255,0.25)';
    var gridColor = isLight ? 'rgba(99,102,241,0.08)' : 'rgba(139,130,255,0.08)';
    var tooltipBg = isLight ? 'rgba(255,255,255,0.95)' : 'rgba(20,18,48,0.95)';
    var tooltipBorder = isLight ? 'rgba(99,102,241,0.25)' : 'rgba(0,242,254,0.25)';
    var tooltipText = isLight ? '#2d2a4a' : '#e0e0f8';

    var series = numCols.map(function (c, idx) {
      var color = colors[idx % colors.length];
      return {
        name: c,
        type: 'bar',
        barWidth: '50%',
        emphasis: {
          itemStyle: { shadowBlur: 12, shadowColor: color, shadowOffsetX: 0 }
        },
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: color },
            { offset: 1, color: isLight ? colors[idx % colors.length] + '88' : colors[idx % colors.length] + '44' }
          ]),
          borderRadius: [6, 6, 0, 0]
        },
        label: {
          show: true,
          position: 'top',
          color: textColor,
          fontSize: 11,
          fontWeight: 600
        },
        data: currentRows.map(function (r) {
          var v = parseFloat(r[c]);
          return isNaN(v) ? 0 : v;
        })
      };
    });

    chart.setOption({
      backgroundColor: 'transparent',
      grid: { left: '3%', right: '4%', bottom: '12%', top: '15%', containLabel: true },
      tooltip: {
        trigger: 'axis',
        backgroundColor: tooltipBg,
        borderColor: tooltipBorder,
        borderWidth: 1,
        textStyle: { color: tooltipText, fontSize: 13 },
        axisPointer: { type: 'shadow', shadowStyle: { color: gridColor } }
      },
      legend: {
        data: numCols,
        bottom: 0,
        textStyle: { color: textColor, fontSize: 12 },
        itemWidth: 12, itemHeight: 12, itemGap: 20
      },
      xAxis: {
        type: 'category',
        data: currentRows.map(function (r) { return String(r[catCol] != null ? r[catCol] : ''); }),
        axisLine: { lineStyle: { color: axisColor } },
        axisTick: { show: false },
        axisLabel: { color: textColor, fontSize: 11, rotate: currentRows.length > 6 ? 30 : 0 }
      },
      yAxis: {
        type: 'value',
        splitLine: { lineStyle: { color: gridColor, type: 'dashed' } },
        axisLine: { show: false },
        axisTick: { show: false },
        axisLabel: { color: textColor, fontSize: 11 }
      },
      series: series
    });

    window.addEventListener('resize', function () { chart.resize(); });
    // Scroll chart into view
    chartEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
</script>
{% end %}
