{% extends "base.html" %}
{% block body %}
<style>
  /* ═══════════════ Variables ═══════════════ */
  :root {
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --spring-soft: cubic-bezier(0.25, 1.2, 0.5, 1);
    --bg-card: rgba(20, 18, 48, 0.50);
    --border: rgba(139, 130, 255, 0.10);
    --border-light: rgba(139, 130, 255, 0.06);
    --text: #e0e0f8;
    --text-muted: #9090b8;
    --bg-input: rgba(18, 16, 38, 0.6);
    --accent: #818cf8;
  }
  [data-theme="light"] {
    --bg-card: rgba(255, 255, 255, 0.55);
    --border: rgba(99, 102, 241, 0.10);
    --border-light: rgba(99, 102, 241, 0.06);
    --text: #2d2a4a;
    --text-muted: #6b6b8e;
    --bg-input: rgba(255, 255, 255, 0.5);
    --accent: #6366f1;
  }

  /* ── Body ── */
  body {
    background: radial-gradient(ellipse at 20% 50%, #1e1b4b 0%, #0f0d22 40%, #09071a 100%) !important;
    min-height: 100vh; color: var(--text);
    font-family: "Microsoft YaHei","PingFang SC","Segoe UI",-apple-system,sans-serif;
    transition: background 0.5s ease;
  }
  [data-theme="light"] body {
    background: radial-gradient(ellipse at 20% 50%, #f2eeff 0%, #eae4fa 40%, #e0daf2 100%) !important;
  }
  .base { background: transparent !important; }

  /* ── Theme Button ── */
  .theme-btn {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    width: 42px; height: 42px; border-radius: 50%;
    border: 1px solid rgba(139,130,255,.25);
    background: rgba(30,26,58,.75); backdrop-filter: blur(20px);
    cursor: pointer; font-size: 18px; display: grid; place-items: center;
    transition: all var(--spring);
    box-shadow: 0 4px 16px rgba(0,0,0,.3), 0 0 0 1px rgba(255,255,255,.04);
  }
  .theme-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(99,102,241,.35); }
  [data-theme="light"] .theme-btn {
    background: rgba(255,255,255,.75); border-color: rgba(99,102,241,.2);
    box-shadow: 0 4px 16px rgba(99,102,241,.1);
  }

  /* ═══════════════ Layout — sidebar + main ═══════════════ */
  .ask-shell {
    display: flex; height: 100vh; overflow: hidden;
    background: transparent;
  }
  .ask-sidebar {
    width: 260px; min-width: 260px; display: flex; flex-direction: column;
    background: rgba(15,13,34,.75); backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-right: 1px solid rgba(139,130,255,.08);
    box-shadow: 4px 0 48px rgba(0,0,0,.25);
    z-index: 2; padding: 20px 14px; transition: background .5s;
  }
  [data-theme="light"] .ask-sidebar {
    background: rgba(255,255,255,.7); border-right-color: rgba(99,102,241,.08);
    box-shadow: 4px 0 48px rgba(99,102,241,.05);
  }
  .ask-sidebar .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; text-decoration: none; cursor: pointer; transition: all var(--spring-soft); }
  .ask-sidebar .brand:hover { transform: translateX(3px); }
  .ask-sidebar .brand:hover .dot { transform: scale(1.1); box-shadow: 0 10px 28px rgba(99,102,241,.6); }
  .ask-sidebar .brand .dot {
    width: 34px; height: 34px; border-radius: 10px;
    background: linear-gradient(135deg, #818cf8, #6366f1);
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 17px;
    box-shadow: 0 6px 20px rgba(99,102,241,.5);
  }
  .ask-sidebar .brand span { color: var(--text); font-weight: 700; font-size: 15px; }
  .ask-sidebar h4 { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .1em; margin: 0 0 10px; }
  .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .history-item {
    padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px;
    color: var(--text-muted); transition: all var(--spring-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border: 1px solid transparent;
  }
  .history-item:hover { background: rgba(99,102,241,.06); color: var(--text); border-color: var(--border); }
  .history-item.active { background: rgba(99,102,241,.1); color: var(--text); border-color: rgba(99,102,241,.25); }
  .history-item .ts { font-size: 10px; color: var(--text-muted); opacity: .6; display: block; }

  /* ── Main ── */
  .ask-main {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    position: relative;
  }
  .ask-content {
    flex: 1; overflow-y: auto; padding: 28px 36px 20px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .ask-header { margin-bottom: 4px; }
  .ask-header h2 { margin: 0; font-size: 22px; font-weight: 700; color: var(--text); }
  .ask-header p { margin: 4px 0 0; font-size: 13px; color: var(--text-muted); }

  /* ── Chart ── */
  #chart {
    width: 100%; height: 400px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px; display: none;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
    transition: background .5s, border-color .5s;
  }

  /* ── Chart Info Card ── */
  .chart-info {
    display: none; font-size: 12px; color: var(--text-muted);
    padding: 6px 14px; border-radius: 8px; background: rgba(99,102,241,.06);
    border: 1px solid var(--border); margin-top: -12px;
  }

  /* ── Table ── */
  .result-bar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .result-bar .btn-sm {
    padding: 6px 14px; font-size: 12px; background: var(--bg-card);
    border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 8px; cursor: pointer; transition: all var(--spring);
  }
  .result-bar .btn-sm:hover { border-color: var(--accent); color: var(--text); }
  .table-wrapper {
    border-radius: 14px; overflow-x: auto; overflow-y: visible; border: 1px solid var(--border);
    background: var(--bg-card); box-shadow: 0 4px 24px rgba(0,0,0,.06);
    transition: background .5s, border-color .5s;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: transparent; }
  th {
    background: rgba(99,102,241,.12); color: #c4b5fd; padding: 12px 16px;
    text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase;
    letter-spacing: .06em; border-bottom: 2px solid rgba(99,102,241,.2);
    position: relative; cursor: help;
  }
  [data-theme="light"] th { background: rgba(99,102,241,.1); color: #4f46e5; }
  th .col-tip {
    display: none; position: absolute; top: calc(100% + 4px); left: 8px;
    background: rgba(15,13,34,.92); color: #e0e0f8; font-size: 11px;
    padding: 4px 10px; border-radius: 6px; white-space: nowrap; z-index: 100;
    text-transform: none; font-weight: 400; letter-spacing: 0;
    border: 1px solid rgba(139,130,255,.2);
  }
  [data-theme="light"] th .col-tip { background: rgba(255,255,255,.95); color: #2d2a4a; }
  th:hover .col-tip { display: block; }
  td {
    padding: 10px 16px; border-bottom: 1px solid var(--border-light);
    color: var(--text); font-size: 13px; line-height: 1.5;
    max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  tbody tr:nth-child(even) td { background: rgba(99,102,241,.03); }
  [data-theme="light"] tbody tr:nth-child(even) td { background: rgba(99,102,241,.04); }
  tbody tr:hover td { background: rgba(99,102,241,.1) !important; color: #fff; }
  [data-theme="light"] tbody tr:hover td { color: #2d2a4a; background: rgba(99,102,241,.12) !important; }

  /* ── Pipeline ── */
  .pipeline-container {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 14px 20px; background: var(--bg-card); border: 1px solid var(--border-light);
    border-radius: 14px; transition: background .5s;
  }
  .pipeline-step { display: flex; align-items: center; gap: 6px; opacity: .3; transition: all var(--spring-soft); }
  .pipeline-step.active, .pipeline-step.success { opacity: 1; }
  .pipeline-step .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--border); transition: all var(--spring-soft);
  }
  .pipeline-step.active .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulseDot .8s infinite alternate; }
  .pipeline-step.success .dot { background: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }
  .pipeline-step.error .dot { background: #f87171; box-shadow: 0 0 8px #f87171; }
  @keyframes pulseDot { from { transform: scale(1); } to { transform: scale(1.5); opacity: .6; } }
  .pipeline-step .lbl { font-size: 11px; color: var(--text-muted); }
  .pipeline-arrow { font-size: 12px; color: var(--border); transition: color .4s; }
  .pipeline-arrow.done { color: var(--neon-green); }

  /* ── Loading ── */
  .loading { display: none; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); font-size: 14px; padding: 16px; background: var(--bg-card); border: 1px dashed var(--border); border-radius: 12px; }
  .loading-spinner { width: 20px; height: 20px; border: 2.5px solid rgba(99,102,241,.2); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  .error { color: #f87171; background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.2); padding: 12px 18px; border-radius: 10px; font-size: 14px; }

  /* ── Input Bar ── */
  .input-bar {
    padding: 16px 36px 20px; border-top: 1px solid var(--border);
    background: var(--bg-card); backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    transition: background .5s, border-color .5s;
  }
  .input-row { display: flex; gap: 12px; align-items: center; }
  .input-row input {
    flex: 1; background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); padding: 14px 20px;
    font-size: 15px; transition: all var(--spring-soft);
    box-shadow: inset 0 2px 6px rgba(0,0,0,.06);
  }
  .input-row input::placeholder { color: var(--text-muted); }
  .input-row input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1), inset 0 2px 6px rgba(0,0,0,.06); }
  .btn-ask {
    padding: 14px 28px; background: linear-gradient(135deg, #6366f1, #7c3aed);
    color: #fff; border: none; border-radius: 14px; font-weight: 600; cursor: pointer;
    font-size: 15px; transition: all var(--spring);
    box-shadow: 0 4px 16px rgba(99,102,241,.3); white-space: nowrap;
  }
  .btn-ask:hover { box-shadow: 0 8px 24px rgba(99,102,241,.45); transform: translateY(-1px); }
  .btn-ask:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Empty State ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--text-muted); text-align: center; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .6; }
  .empty-state h3 { margin: 0 0 8px; font-size: 18px; color: var(--text); font-weight: 600; }
  .empty-state p { margin: 0; font-size: 14px; max-width: 400px; line-height: 1.7; }

  @media(max-width:768px) {
    .ask-sidebar { display: none; }
    .ask-content { padding: 20px 16px 12px; }
    .input-bar { padding: 12px 16px 16px; }
  }

  /* ── Thinking Bubble (Agent iteration display) ── */
  .think-bubble {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px 20px; font-size: 14px;
    color: var(--text); line-height: 1.7; display: none;
    animation: msgSlideUp .3s var(--spring-soft);
  }
  .think-bubble .think-label {
    font-size: 11px; color: var(--accent); text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px; font-weight: 600;
  }
  @keyframes msgSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Tool Mini Card ── */
  .tool-mini {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-size: 12px;
    color: var(--text-muted); display: flex; align-items: center; gap: 10px;
    animation: msgSlideUp .3s var(--spring-soft);
  }
  .tool-mini .tm-icon { font-size: 16px; }
  .tool-mini .tm-status { font-size: 11px; margin-left: auto; }
  .tool-mini.success { border-color: rgba(52,211,153,.3); }
  .tool-mini.error { border-color: rgba(248,113,113,.3); }
</style>

<button class="theme-btn" id="themeIcon" onclick="toggleTheme()" title="切换主题">🌙</button>

<div class="ask-shell">
  <!-- ═══════════════ Sidebar ═══════════════ -->
  <div class="ask-sidebar">
    <a class="brand" href="/home" title="← 返回首页"><div class="dot">D</div><span>智能问数</span></a>
    <h4>📝 查询历史</h4>
    <div class="history-list" id="historyList">
      <div style="color:var(--text-muted);font-size:12px;padding:8px;">暂无查询记录</div>
    </div>
  </div>

  <!-- ═══════════════ Main ═══════════════ -->
  <div class="ask-main">
    <div class="ask-content" id="askContent">
      <div class="pipeline-container" id="pipelineContainer">
        <div class="pipeline-step" id="step-nl"><div class="dot"></div><span class="lbl">自然语言输入</span></div>
        <span class="pipeline-arrow">→</span>
        <div class="pipeline-step" id="step-sql"><div class="dot"></div><span class="lbl">SQL 翻译转换</span></div>
        <span class="pipeline-arrow">→</span>
        <div class="pipeline-step" id="step-exec"><div class="dot"></div><span class="lbl">数据库执行</span></div>
        <span class="pipeline-arrow">→</span>
        <div class="pipeline-step" id="step-render"><div class="dot"></div><span class="lbl">结果可视化</span></div>
      </div>

      <div class="loading" id="loading">
        <div class="loading-spinner"></div><span>正在解析语言结构并执行数据库查询...</span>
      </div>

      <!-- Agent thinking bubble (SSE streaming text) -->
      <div class="think-bubble" id="thinkBubble"></div>

      <div id="errorArea" class="error" style="display:none"></div>

      <!-- Chart -->
      <div id="chart"></div>
      <div class="chart-info" id="chartInfo">💡 鼠标悬停柱体查看数据库原始字段名</div>

      <!-- Results -->
      <div id="resultArea"{% if not results %} style="display:none"{% end %}>
        <div class="result-bar">
          <span id="rowCount" style="color:var(--text-muted);font-size:.88rem;"></span>
          <button class="btn btn-sm" onclick="renderChart()">📊 刷新图表</button>
          <a id="csvLink" href="#" class="btn btn-sm" style="text-decoration:none;display:none">📥 CSV</a>
        </div>
        <div class="table-wrapper">
          <table id="resultTable"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="icon">📊</div>
        <h3>用自然语言查询数据</h3>
        <p>在下方输入问题，AI 将自动转换为 SQL 查询并可视化结果。例如：「最近7天采集条目按来源统计数量」</p>
      </div>
    </div>

    <!-- Input Bar -->
    <div class="input-bar">
      <div class="input-row">
        <input type="text" id="queryInput" placeholder="用自然语言描述你的查询..."
          onkeydown="if(event.key==='Enter') submitQuery()">
        <button class="btn-ask" id="submitBtn" onclick="submitQuery()">⚡ 问数</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<div id="ask-init-data" hidden>{% raw ask_init_json %}</div>
<script>
  console.log('[ask] script start');
  window.onerror = function(msg, url, line) {
    console.error('[ask] JS ERROR:', msg, 'at line', line);
  };
  var _askInit = JSON.parse(document.getElementById('ask-init-data').textContent);
  console.log('[ask] init data loaded, rows=' + (_askInit.results || []).length);
  var currentColumns = _askInit.columns || [];
  var currentRows = _askInit.results || [];
  try {
    var history = JSON.parse(localStorage.getItem('ask_history') || '[]');
  } catch(e) {
    var history = [];
  }
  var _chartInstance = null;
  var _chartResizeHandler = null;

  // Init theme
  if (typeof initThemeIcon === 'function') initThemeIcon('themeIcon');

  /* ── Column name beautifier ── */
  function beautyCol(raw) {
    var map = {
      id: '编号', title: '标题', name: '名称', content: '内容', url: '链接',
      summary: '摘要', keywords: '关键词', sentiment: '情感倾向', risk: '风险指数',
      status: '状态', created_at: '创建时间', updated_at: '更新时间',
      collected_at: '采集时间', published_at: '发布时间', deep_collected_at: '深度采集时间',
      is_deep_collected: '是否深度采集', source_id: '来源ID', source_name: '来源名称',
      source_type: '来源类型', fetch_interval: '采集间隔', last_fetched: '最后采集',
      item_count: '条目数量', count: '数量', total: '总计',
      model_id: '模型ID', model_name: '模型名称', employee_id: '员工ID',
      skill_type: '技能类型', config_json: '配置',
      category: '分类', description: '描述', sql_query: 'SQL查询',
      province: '省份', city: '城市', district: '区县',
    };
    // Try direct match first
    if (map[raw]) return map[raw];
    // Try lowercase
    var lower = raw.toLowerCase();
    if (map[lower]) return map[lower];
    // Handle _count, _total suffixes (slice suffix off, preserve original case in fallback)
    if (lower.endsWith('_count')) { var stem = lower.slice(0, -6); return (map[stem] || raw.slice(0, -6)) + '数量'; }
    if (lower.endsWith('_total')) { var stem = lower.slice(0, -6); return (map[stem] || raw.slice(0, -6)) + '合计'; }
    if (lower.endsWith('_at') || lower.endsWith('_time')) return (map[lower] || raw) + '';
    // Fallback: prettify snake_case
    return raw.replace(/_/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  /* ── History ── */
  function addHistory(query) {
    // Remove duplicate entries with the same query text (prevents duplicates
    // when loadHistory → submitQuery → addHistory re-adds the same query)
    history = history.filter(function(h) { return h.query !== query; });
    history.unshift({
      query: query, columns: currentColumns.slice(), rowCount: currentRows.length,
      ts: new Date().toLocaleTimeString()
    });
    if (history.length > 50) history.pop();
    try { localStorage.setItem('ask_history', JSON.stringify(history)); } catch(e) { /* quota */ }
    renderHistory(0);
  }

  function renderHistory(activeIdx) {
    if (activeIdx === undefined) activeIdx = 0;
    var el = document.getElementById('historyList');
    el.innerHTML = history.map(function(h, i) {
      return '<div class="history-item' + (i === activeIdx ? ' active' : '') + '" onclick="loadHistory(' + i + ')">'
        + h.query.substring(0, 40) + (h.query.length > 40 ? '...' : '')
        + '<span class="ts">' + h.ts + ' · ' + (h.rowCount || 0) + '条</span></div>';
    }).join('') || '<div style="color:var(--text-muted);font-size:12px;padding:8px;">暂无查询记录</div>';
  }

  function loadHistory(idx) {
    var h = history[idx];
    if (!h) return;
    document.getElementById('queryInput').value = h.query;
    renderHistory(idx);
    // Auto re-execute the query
    submitQuery();
  }

  /* ── Pipeline ── */
  function resetPipeline() {
    document.querySelectorAll('.pipeline-step').forEach(function(el) { el.className = 'pipeline-step'; });
    document.querySelectorAll('.pipeline-arrow').forEach(function(el) { el.classList.remove('done'); });
  }

  async function runPipelineAnimation() {
    resetPipeline();
    var sleep = function(ms) { return new Promise(function(r) { setTimeout(r, ms); }); };
    var steps = ['step-nl', 'step-sql', 'step-exec'];  // only first 3 auto-complete
    for (var i = 0; i < steps.length; i++) {
      var el = document.getElementById(steps[i]);
      el.classList.add('active');
      await sleep(350);
      if (document.getElementById('loading').style.display === 'none') return;
      el.classList.remove('active');
      el.classList.add('success');
      var arrow = document.querySelectorAll('.pipeline-arrow')[i];
      if (arrow) arrow.classList.add('done');
    }
    // Step 4 stays active (pulsing) until fetch resolves
    var renderEl = document.getElementById('step-render');
    if (renderEl && document.getElementById('loading').style.display !== 'none') {
      renderEl.classList.add('active');
    }
  }

  /* ── Submit ── */
  async function submitQuery() {
    var q = document.getElementById('queryInput').value.trim();
    if (!q) return;
    console.log('[ask] submitQuery called, q=' + q);
    var btn = document.getElementById('submitBtn');
    try {
      btn.disabled = true;
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('resultArea').style.display = 'none';
      document.getElementById('chart').style.display = 'none';
      document.getElementById('chartInfo').style.display = 'none';
      document.getElementById('errorArea').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';
      var thinkBubble = document.getElementById('thinkBubble');
      thinkBubble.style.display = 'none'; thinkBubble.innerHTML = '';
      document.querySelectorAll('.tool-mini').forEach(function(el) { el.remove(); });
      if (_chartResizeHandler) { window.removeEventListener('resize', _chartResizeHandler); _chartResizeHandler = null; }
      var _existingChart = typeof echarts !== 'undefined' ? echarts.getInstanceByDom(document.getElementById('chart')) : null;
      if (_existingChart) _existingChart.dispose();
      if (_chartInstance) _chartInstance = null;
      runPipelineAnimation();
    } catch(initErr) {
      // If setup fails, still try the fetch
    }

    var thinkContent = '';
    try {
      var resp = await fetch('/ask/query', {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'X-XSRFToken': getCookie('_xsrf') },
        body: JSON.stringify({ query: q })
      });
      if (!resp.ok) {
        var errText = await resp.text();
        throw new Error('HTTP ' + resp.status + ': ' + errText);
      }
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buffer += decoder.decode(chunk.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data: ')) continue;
          var jsonStr = line.substring(6);
          if (jsonStr === '[DONE]') continue;
          try {
            var parsed = JSON.parse(jsonStr);
            if (parsed.type === 'text') {
              thinkContent += parsed.content;
              var assembled = thinkContent.replace(/\n/g, '<br>');
              thinkBubble.innerHTML = '<div class="think-label">🤖 AI 思考中…</div>' + assembled;
              thinkBubble.style.display = 'block';
            } else if (parsed.type === 'tool_call') {
              var tm = document.createElement('div');
              tm.className = 'tool-mini';
              tm.innerHTML = '<span class="tm-icon">🔧</span><span>' + (parsed.name || 'tool') + '</span><span class="tm-status">执行中…</span>';
              thinkBubble.parentNode.insertBefore(tm, thinkBubble.nextSibling);
            } else if (parsed.type === 'tool_result') {
              var cards = document.querySelectorAll('.tool-mini:not(.success):not(.error)');
              var lastCard = cards[cards.length - 1];
              if (lastCard) {
                lastCard.classList.add(parsed.name === 'warehouse_query' ? 'success' : 'error');
                lastCard.querySelector('.tm-status').textContent = parsed.name === 'warehouse_query' ? '✓' : '✗';
              }
            } else if (parsed.type === 'done') {
              document.getElementById('loading').style.display = 'none';
              var rArrow = document.querySelectorAll('.pipeline-arrow')[2];
              var rStep = document.getElementById('step-render');
              if (rArrow) rArrow.classList.add('done');
              if (rStep) { rStep.classList.remove('active'); rStep.classList.add('success'); }
              currentColumns = parsed.columns || [];
              currentRows = parsed.rows || [];
              if (thinkContent) thinkBubble.innerHTML = '<div class="think-label">✅ 查询完成</div>' + thinkContent.replace(/\n/g, '<br>');
              showResults();
              addHistory(q);
            } else if (parsed.type === 'error') {
              document.getElementById('loading').style.display = 'none';
              var rArrow2 = document.querySelectorAll('.pipeline-arrow')[2];
              var rStep2 = document.getElementById('step-render');
              if (rArrow2) rArrow2.classList.remove('done');
              if (rStep2) { rStep2.classList.remove('active'); rStep2.classList.add('error'); }
              document.getElementById('errorArea').textContent = parsed.message || '查询失败';
              document.getElementById('errorArea').style.display = 'block';
            }
          } catch(e) { /* skip malformed JSON */ }
        }
      }
    } catch(e) {
      document.getElementById('loading').style.display = 'none';
      var rArrow3 = document.querySelectorAll('.pipeline-arrow')[2];
      var rStep3 = document.getElementById('step-render');
      if (rArrow3) rArrow3.classList.remove('done');
      if (rStep3) { rStep3.classList.remove('active'); rStep3.classList.add('error'); }
      document.getElementById('errorArea').textContent = '请求失败：' + (e.message || '未知错误');
      document.getElementById('errorArea').style.display = 'block';
    }
    btn.disabled = false;
  }

  function showResults() {
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('emptyState').style.display = 'none';
    renderTable(currentColumns, currentRows);
    buildCsvLink(currentColumns, currentRows);
    // Auto-render chart
    setTimeout(function() { renderChart(); }, 200);
  }

  /* ── Table ── */
  function renderTable(cols, rows) {
    var thead = document.getElementById('thead');
    var tbody = document.getElementById('tbody');
    thead.replaceChildren(); tbody.replaceChildren();
    var tr = document.createElement('tr');
    cols.forEach(function(c) {
      var th = document.createElement('th');
      th.innerHTML = beautyCol(c) + '<span class="col-tip">🔑 ' + c + '</span>';
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    rows.forEach(function(row) {
      var tr2 = document.createElement('tr');
      cols.forEach(function(c) {
        var td = document.createElement('td');
        var val = row[c] != null ? String(row[c]) : '';
        td.textContent = val;
        td.title = val;
        tr2.appendChild(td);
      });
      tbody.appendChild(tr2);
    });
    document.getElementById('rowCount').textContent = '共 ' + rows.length + ' 条结果';
  }

  function buildCsvLink(cols, rows) {
    var headerRow = cols.map(function(c) {
        var v = String(c);
        return v.includes(',') || v.includes('"') || v.includes('\n') ? '"' + v.replace(/"/g, '""') + '"' : v;
      }).join(',');
    var lines = [headerRow];
    for (var i = 0; i < rows.length; i++) {
      lines.push(cols.map(function(c) {
        var v = rows[i][c] != null ? String(rows[i][c]) : '';
        return v.includes(',') || v.includes('"') ? '"' + v.replace(/"/g, '""') + '"' : v;
      }).join(','));
    }
    var blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
    var link = document.getElementById('csvLink');
    if (link.href && link.href.startsWith('blob:')) URL.revokeObjectURL(link.href);
    link.href = URL.createObjectURL(blob);
    link.download = 'result.csv';
    link.style.display = 'inline-block';
  }

  /* ── Chart ── */
  function renderChart() {
    if (!currentRows.length || !currentColumns.length) return;
    if (typeof echarts === 'undefined') { console.error('[ask] echarts not loaded'); return; }
    var chartEl = document.getElementById('chart');
    chartEl.style.display = 'block';
    document.getElementById('chartInfo').style.display = 'block';
    // Properly clean up any existing echarts instance bound to this DOM element
    if (_chartResizeHandler) { window.removeEventListener('resize', _chartResizeHandler); _chartResizeHandler = null; }
    var existing = echarts.getInstanceByDom(chartEl);
    if (existing) existing.dispose();
    if (_chartInstance) _chartInstance = null;
    // Ensure DOM is clean before re-init
    chartEl.innerHTML = '';

    var chart = echarts.init(chartEl);
    _chartInstance = chart;

    var catCol = currentColumns[0];
    var numCols = currentColumns.slice(1).filter(function(c) {
      return currentRows.some(function(r) { return !isNaN(parseFloat(r[c])); });
    });
    if (!numCols.length && currentColumns.length >= 2) numCols = [currentColumns[1]];
    if (!numCols.length) { chartEl.style.display = 'none'; return; }

    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    var colors = isLight
      ? ['#6366f1','#8b5cf6','#ec4899','#10b981','#f59e0b']
      : ['#818cf8','#a78bfa','#f472b6','#34d399','#fbbf24'];
    var textColor = isLight ? '#4d4a70' : '#c4b5fd';
    var gridColor = isLight ? 'rgba(99,102,241,.08)' : 'rgba(139,130,255,.08)';
    var tooltipBg = isLight ? 'rgba(255,255,255,.95)' : 'rgba(20,18,48,.95)';
    var tooltipText = isLight ? '#2d2a4a' : '#e0e0f8';

    var numBars = numCols.length;
    var barWidth = numBars > 2 ? '60%' : '40%';

    var series = numCols.map(function(c, idx) {
      var color = colors[idx % colors.length];
      return {
        name: beautyCol(c),
        type: 'bar',
        barWidth: barWidth,
        barGap: '20%',
        emphasis: { itemStyle: { shadowBlur: 10, shadowColor: color } },
        itemStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: color }, { offset: 1, color: color + '44' }
          ]),
          borderRadius: [5, 5, 0, 0]
        },
        label: {
          show: true,
          position: 'top',
          color: textColor,
          fontSize: 10,
          fontWeight: 600,
          rotate: numBars > 2 ? 0 : 0
        },
        data: currentRows.map(function(r) {
          var v = parseFloat(r[c]);
          return isNaN(v) ? 0 : v;
        })
      };
    });

    chart.setOption({
      backgroundColor: 'transparent',
      grid: { left: '5%', right: '5%', bottom: '14%', top: '16%', containLabel: true },
      tooltip: {
        trigger: 'axis',
        backgroundColor: tooltipBg,
        borderColor: isLight ? 'rgba(99,102,241,.2)' : 'rgba(139,130,255,.2)',
        borderWidth: 1, padding: [10, 14],
        textStyle: { color: tooltipText, fontSize: 13 },
        axisPointer: { type: 'shadow', shadowStyle: { color: gridColor } },
        formatter: function(params) {
          var html = '<strong>' + params[0].axisValue + '</strong><br/>';
          params.forEach(function(p) {
            html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + p.color + ';margin-right:6px;"></span>';
            html += beautyCol(p.seriesName) + ': <strong>' + p.value + '</strong>';
            html += '<br/><span style="font-size:10px;color:' + (isLight ? '#9ca3af' : '#6b6b9e') + ';">字段: ' + p.seriesName + '</span><br/>';
          });
          return html;
        }
      },
      legend: {
        data: numCols.map(function(c) { return beautyCol(c); }),
        bottom: 0, textStyle: { color: textColor, fontSize: 12 },
        itemWidth: 12, itemHeight: 12, itemGap: 20
      },
      xAxis: {
        type: 'category',
        data: currentRows.map(function(r) {
          var v = r[catCol] != null ? String(r[catCol]) : '';
          return v.length > 12 ? v.substring(0, 11) + '…' : v;
        }),
        axisLine: { lineStyle: { color: isLight ? 'rgba(99,102,241,.25)' : 'rgba(139,130,255,.25)' } },
        axisTick: { show: false },
        axisLabel: {
          color: textColor, fontSize: 11,
          rotate: currentRows.length > 5 ? 25 : 0,
          interval: 0
        },
        name: beautyCol(catCol),
        nameTextStyle: { color: textColor, fontSize: 11, fontWeight: 600, padding: [10, 0, 0, 0] }
      },
      yAxis: {
        type: 'value',
        splitLine: { lineStyle: { color: gridColor, type: 'dashed' } },
        axisLine: { show: false }, axisTick: { show: false },
        axisLabel: { color: textColor, fontSize: 11 },
        name: numCols.length === 1 ? beautyCol(numCols[0]) : '数值',
        nameTextStyle: { color: textColor, fontSize: 11, fontWeight: 600, padding: [0, 0, 0, 10] }
      },
      series: series
    });

    chartEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

    _chartResizeHandler = function() { chart.resize(); };
    window.addEventListener('resize', _chartResizeHandler);
  }

  function getCookie(name) {
    var v = document.cookie.split('; ').find(function(r) { return r.startsWith(name + '='); });
    return v ? decodeURIComponent(v.split('=')[1]) : '';
  }

  // Load initial data
  if (currentRows.length) {
    showResults();
    document.querySelectorAll('.pipeline-step').forEach(function(el) { el.classList.add('success'); });
  }
</script>
{% end %}
